<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      background: linear-gradient(-45deg, #0d9488, #14b8a6, #2dd4bf, #0891b2);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bubble {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    .bubble:nth-child(1) { width: 120px; height: 120px; top: 10%; left: 8%; animation-delay: 0s; }
    .bubble:nth-child(2) { width: 80px;  height: 80px;  top: 70%; left: 85%; animation-delay: 2s; }
    .bubble:nth-child(3) { width: 60px;  height: 60px;  top: 20%; left: 80%; animation-delay: 4s; }
    .bubble:nth-child(4) { width: 100px; height: 100px; top: 80%; left: 15%; animation-delay: 1s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50%       { transform: translateY(-30px) scale(1.05); opacity: 1; }
    }

    .container {
      position: relative;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow:
        0 25px 50px rgba(13, 148, 136, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.4);
      animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      display: block;
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f766e;
      margin-bottom: 0.5rem;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .subtitle {
      text-align: center;
      color: #5eead4;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-weight: 500;
      animation: fadeIn 1s 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    li {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.25rem;
      background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
      border-radius: 14px;
      border: 1px solid rgba(45, 212, 191, 0.3);
      color: #134e4a;
      font-size: 1.05rem;
      font-weight: 500;
      cursor: default;
      opacity: 0;
      transform: translateX(-20px);
      animation: slideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    }

    li:nth-child(1) { animation-delay: 0.5s; }
    li:nth-child(2) { animation-delay: 0.7s; }
    li:nth-child(3) { animation-delay: 0.9s; }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    li::before {
      content: '';
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #14b8a6;
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    li:hover {
      transform: translateX(8px) scale(1.02);
      box-shadow: 0 8px 24px rgba(13, 148, 136, 0.2);
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
    }

    li:hover::before {
      transform: scale(1.4);
      box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.3);
    }
  </style>
</head>
<body>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="container">
    <span class="icon">💡</span>
    <h1>Генератор идей для постов</h1>
    <p class="subtitle">Выберите формат контента</p>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сториз</li>
      <li>Контент план на неделю</li>
    </ul>
  </div>
</body>
</html>
